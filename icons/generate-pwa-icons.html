<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Генератор иконок PWA</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f4f4f9; }
        .status { margin: 10px 0; padding: 10px; background: #e8f5e9; border-radius: 5px; }
        canvas { display: none; }
    </style>
</head>
<body>
    <h1>🎨 Генератор иконок для PWA</h1>
    <div class="status" id="status">Нажмите кнопку для генерации...</div>
    <button onclick="generateIcons()" style="padding: 15px 30px; font-size: 16px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">Сгенерировать иконки</button>
    <canvas id="canvas"></canvas>
    
    <script>
        const sizes = [192, 512];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const status = document.getElementById('status');

        function drawIcon(size) {
            canvas.width = size;
            canvas.height = size;

            // Градиентный фон
            const gradient = ctx.createLinearGradient(0, 0, size, size);
            gradient.addColorStop(0, '#667eea');
            gradient.addColorStop(1, '#764ba2');
            
            // Скруглённый квадрат
            const radius = size * 0.2;
            ctx.fillStyle = gradient;
            roundRect(ctx, 0, 0, size, size, radius);
            ctx.fill();

            // Белая основа планера
            const margin = size * 0.15;
            const plannerWidth = size * 0.7;
            const plannerHeight = size * 0.5;
            const plannerX = (size - plannerWidth) / 2;
            const plannerY = (size - plannerHeight) / 2 + size * 0.1;

            ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
            roundRect(ctx, plannerX, plannerY, plannerWidth, plannerHeight, size * 0.04);
            ctx.fill();

            // Верхняя цветная полоса
            ctx.fillStyle = gradient;
            ctx.fillRect(plannerX, plannerY, plannerWidth, plannerHeight * 0.25);

            // Линии задач
            ctx.fillStyle = '#667eea';
            const lineY = plannerY + plannerHeight * 0.4;
            const lineHeight = plannerHeight * 0.08;
            roundRect(ctx, plannerX + size * 0.1, lineY, plannerWidth * 0.6, lineHeight, lineHeight / 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(102, 126, 234, 0.7)';
            roundRect(ctx, plannerX + size * 0.1, lineY + lineHeight * 1.5, plannerWidth * 0.5, lineHeight, lineHeight / 2);
            ctx.fill();

            ctx.fillStyle = 'rgba(118, 75, 162, 0.7)';
            roundRect(ctx, plannerX + size * 0.1, lineY + lineHeight * 3, plannerWidth * 0.55, lineHeight, lineHeight / 2);
            ctx.fill();

            // Галочка
            ctx.strokeStyle = '#28a745';
            ctx.lineWidth = Math.max(3, size * 0.015);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.beginPath();
            const checkX = plannerX + size * 0.08;
            const checkY = plannerY + plannerHeight * 0.7;
            const checkSize = size * 0.08;
            ctx.moveTo(checkX, checkY + checkSize * 0.5);
            ctx.lineTo(checkX + checkSize * 0.5, checkY + checkSize);
            ctx.lineTo(checkX + checkSize * 1.2, checkY);
            ctx.stroke();

            return canvas.toDataURL('image/png');
        }

        function roundRect(ctx, x, y, w, h, r) {
            if (w < 2 * r) r = w / 2;
            if (h < 2 * r) r = h / 2;
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.arcTo(x + w, y, x + w, y + h, r);
            ctx.arcTo(x + w, y + h, x, y + h, r);
            ctx.arcTo(x, y + h, x, y, r);
            ctx.arcTo(x, y, x + w, y, r);
            ctx.closePath();
        }

        async function generateIcons() {
            status.innerHTML = '⏳ Генерация иконок...';
            
            for (let i = 0; i < sizes.length; i++) {
                const size = sizes[i];
                const dataUrl = drawIcon(size);
                
                // Создаём ссылку для скачивания
                const link = document.createElement('a');
                link.download = `icon-${size}x${size}.png`;
                link.href = dataUrl;
                link.click();
                
                status.innerHTML += `<br>✅ icon-${size}x${size}.png сгенерирована`;
                
                // Ждём между генерациями
                await new Promise(r => setTimeout(r, 500));
            }
            
            status.innerHTML += '<br><br>🎉 Все иконки сгенерированы! Проверьте папку загрузок.';
            status.style.background = '#c8e6c9';
        }
    </script>
</body>
</html>
