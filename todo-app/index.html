<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#667eea">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Планер">
    <title>Планер-Органайзер</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
</head>
<body>
    <div class="app-container">
        <!-- Левая панель - Календарь -->
        <aside class="sidebar" id="sidebar-panel">
            <button class="close-mobile" id="close-sidebar">&times;</button>
            <div class="calendar-section">
                <div class="calendar-header">
                    <button id="prev-month">&lt;</button>
                    <h2 id="current-month"></h2>
                    <button id="next-month">&gt;</button>
                </div>
                <div class="calendar-grid">
                    <div class="weekday">Пн</div>
                    <div class="weekday">Вт</div>
                    <div class="weekday">Ср</div>
                    <div class="weekday">Чт</div>
                    <div class="weekday">Пт</div>
                    <div class="weekday">Сб</div>
                    <div class="weekday">Вс</div>
                </div>
                <div class="calendar-days" id="calendar-days"></div>
            </div>
            
            <div class="notes-section">
                <h3>📝 Заметки</h3>
                <textarea id="notes-area" placeholder="Ваши заметки..."></textarea>
                <button id="save-notes" class="btn-save">Сохранить</button>
            </div>
        </aside>

        <!-- Основная панель - Задачи -->
        <main class="main-content">
            <header class="main-header">
                <button class="mobile-only-btn" id="open-calendar">📅</button>
                <h1>📋 Мои Задачи</h1>
                <button class="mobile-only-btn" id="open-stats">📊</button>
                <div class="header-stats">
                    <span id="tasks-count">Всего: 0</span>
                    <span id="completed-count">Выполнено: 0</span>
                </div>
            </header>

            <div class="add-task-section">
                <div class="input-row">
                    <input type="text" id="task-input" placeholder="Что нужно сделать?">
                    <button id="add-task-btn" class="btn-add">Добавить</button>
                </div>
                <div class="task-options">
                    <select id="task-category">
                        <option value="work">💼 Работа</option>
                        <option value="home">🏠 Дом</option>
                        <option value="study">📚 Учёба</option>
                        <option value="personal">👤 Личное</option>
                        <option value="health">❤️ Здоровье</option>
                        <option value="other">📌 Другое</option>
                    </select>
                    <select id="task-priority">
                        <option value="low">🟢 Низкий</option>
                        <option value="medium" selected>🟡 Средний</option>
                        <option value="high">🔴 Высокий</option>
                        <option value="urgent">⚡ Срочно</option>
                    </select>
                    <input type="date" id="task-date">
                    <input type="time" id="task-time">
                    <label class="reminder-label">
                        <input type="checkbox" id="task-reminder"> Напоминание
                    </label>
                </div>
            </div>

            <div class="filters-section">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="today">Сегодня</button>
                <button class="filter-btn" data-filter="week">Неделя</button>
                <button class="filter-btn" data-filter="completed">Выполнено</button>
                <div class="category-filters">
                    <button class="category-filter" data-category="work">💼</button>
                    <button class="category-filter" data-category="home">🏠</button>
                    <button class="category-filter" data-category="study">📚</button>
                    <button class="category-filter" data-category="personal">👤</button>
                    <button class="category-filter" data-category="health">❤️</button>
                    <button class="category-filter" data-category="other">📌</button>
                </div>
            </div>

            <div class="tasks-container">
                <div class="tasks-column" id="tasks-column">
                    <!-- Задачи будут здесь -->
                </div>
            </div>
        </main>

        <!-- Правая панель - Напоминания и статистика -->
        <aside class="right-sidebar" id="right-sidebar-panel">
            <button class="close-mobile" id="close-right-sidebar">&times;</button>
            <div class="reminders-section">
                <h3>🔔 Напоминания</h3>
                <div id="reminders-list"></div>
            </div>

            <div class="stats-section">
                <h3>📊 Статистика</h3>
                <div class="stats-chart">
                    <div class="stat-item">
                        <span class="stat-label">Выполнено</span>
                        <div class="progress-bar">
                            <div class="progress-fill" id="completed-progress"></div>
                        </div>
                        <span id="completed-percent">0%</span>
                    </div>
                </div>
                <div class="stats-details" id="stats-details"></div>
            </div>

            <div class="upcoming-section">
                <h3>📅 Ближайшие</h3>
                <div id="upcoming-tasks"></div>
            </div>
        </aside>
    </div>

    <!-- Мобильная навигация -->
    <nav class="mobile-nav">
        <button class="mobile-nav-btn active" data-panel="tasks">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 11l3 3L22 4"/>
                <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
            </svg>
            <span>Задачи</span>
        </button>
        <button class="mobile-nav-btn" data-panel="calendar">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/>
                <line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            <span>Календарь</span>
        </button>
        <button class="mobile-nav-btn" data-panel="stats">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="20" x2="18" y2="10"/>
                <line x1="12" y1="20" x2="12" y2="4"/>
                <line x1="6" y1="20" x2="6" y2="14"/>
            </svg>
            <span>Статистика</span>
        </button>
        <button class="mobile-nav-btn" data-panel="notes">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="16" y1="13" x2="8" y2="13"/>
                <line x1="16" y1="17" x2="8" y2="17"/>
            </svg>
            <span>Заметки</span>
        </button>
    </nav>

    <!-- Модальное окно редактирования -->
    <div class="modal" id="edit-modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h3>Редактировать задачу</h3>
            <input type="text" id="edit-task-input">
            <select id="edit-task-category">
                <option value="work">💼 Работа</option>
                <option value="home">🏠 Дом</option>
                <option value="study">📚 Учёба</option>
                <option value="personal">👤 Личное</option>
                <option value="health">❤️ Здоровье</option>
                <option value="other">📌 Другое</option>
            </select>
            <select id="edit-task-priority">
                <option value="low">🟢 Низкий</option>
                <option value="medium">🟡 Средний</option>
                <option value="high">🔴 Высокий</option>
                <option value="urgent">⚡ Срочно</option>
            </select>
            <input type="date" id="edit-task-date">
            <input type="time" id="edit-task-time">
            <button id="save-edit-btn" class="btn-save">Сохранить</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Регистрация Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('Service Worker зарегистрирован:', reg.scope))
                    .catch(err => console.log('Service Worker не зарегистрирован:', err));
            });
        }

        // Запрос разрешения на уведомления
        document.addEventListener('DOMContentLoaded', () => {
            if ('Notification' in window && Notification.permission === 'default') {
                // Запрашиваем разрешение при первом взаимодействии
                document.body.addEventListener('click', function requestPermission() {
                    Notification.requestPermission();
                    document.body.removeEventListener('click', requestPermission);
                }, { once: true });
            }
        });
    </script>
</body>
</html>
