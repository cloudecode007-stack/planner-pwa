<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Фон -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  
  <!-- Календарь/Планер иконка -->
  <g fill="white" transform="translate(256, 256)">
    <!-- Основной прямоугольник -->
    <rect x="-140" y="-100" width="280" height="220" rx="20" fill="white" opacity="0.95"/>
    
    <!-- Верхняя полоска -->
    <rect x="-140" y="-100" width="280" height="60" rx="20" fill="white"/>
    <rect x="-140" y="-50" width="280" height="60" fill="url(#grad)"/>
    
    <!-- Кружки-крепления -->
    <circle cx="-80" cy="-100" r="15" fill="white"/>
    <circle cx="0" cy="-100" r="15" fill="white"/>
    <circle cx="80" cy="-100" r="15" fill="white"/>
    
    <!-- Линии задач -->
    <rect x="-100" y="-20" width="200" height="12" rx="6" fill="#667eea"/>
    <rect x="-100" y="10" width="160" height="12" rx="6" fill="#764ba2" opacity="0.7"/>
    <rect x="-100" y="40" width="180" height="12" rx="6" fill="#667eea" opacity="0.7"/>
    
    <!-- Галочка выполненной задачи -->
    <path d="M -110 65 L -95 80 L -70 50" stroke="#28a745" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="-60" y="55" width="140" height="12" rx="6" fill="#ccc"/>
  </g>
</svg>
